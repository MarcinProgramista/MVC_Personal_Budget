<div class="border border-warning bg-dark rounded shadow-lg ">
    <div class="d-flex align-items-center p-1" style="width: 100%; column-gap: 10px;">
        <button id="toggleListExpensesBalanceBtn"
            class="btn btn-outline-secondary text-warning d-flex justify-content-between align-items-center flex-grow-1">
            <span><i class="fas fa-money-bill-wave me-1"></i>Expenses</span>
            <span id="toggleExpensesBalanceArrow"><i class="fas fa-arrow-down text-warning"></i></span>
        </button>
    </div>
    <!-- 🔽 Sekcja z listą -->
    <div id="expenseBalanceListContainer" class="fade-section show d-flex align-items-center flex-column"
        style="width: 100%;">
        <!-- 🔹 Lista przychodów -->
        <ul id="expenseBalanceCategoriesList" class="list-group custom-list" style="width: 95%; margin: 0 auto;">
            {% for expense in expenses %}
            <li
                class="list-group-item d-flex justify-content-between border border-warning align-items-center text-light">
                <div class="d-flex flex-column">
                    <div class="d-flex flex-row align-items-center ">
                        <i class="fas fa-circle me-2 text-success"></i>
                        <span class="fw-bold">{{ expense.Category }}</span>
                    </div>
                </div>
                <span class="d-flex flex-row">
                    <span class="d-flex align-items-center">
                        <strong class="text-light text-center mx-2">{{ expense.Amount }} PLN</strong>
                    </span>
                </span>
            </li>
            {% endfor %}
        </ul>
        <!-- 🔹 Suma przychodów -->
        <div class="d-flex align-items-center" style="width: 95%;">
            <div
                class="border border-warning bg-success rounded shadow-lg d-flex align-items-end justify-content-center position-relative flex-grow-1 p-1">
                SUM :<strong class="text-light m-0">{{ sumALlExpenses }} PLN</strong>
            </div>
            <!-- 🔹 Wykres -->

        </div>
        <!-- <div id="piechartExpenses" class="row justify-content-center bg-dark w-100" style="height: 400px;"></div> -->
    </div>
</div>
<!-- 🔹 Dane Twig -> JSON -->
<script>
    const expensesData = {{ expenses| json_encode | raw }};
</script>
<!-- 🔹 Google Charts -->
<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
<script type="text/javascript">
    google.charts.load('current', { 'packages': ['corechart'] });
    google.charts.setOnLoadCallback(drawChart);
    window.addEventListener('resize', drawChart); // responsywny wykres

    function drawChart() {
        if (!expensesData || expensesData.length === 0) return;

        const dataArray = [['Category', 'Amount']];
        expensesData.forEach(expense => {
            dataArray.push([expense.Category, parseFloat(expense.Amount)]);
        });

        const data = google.visualization.arrayToDataTable(dataArray);

        const options = {
            title: 'Expenses',
            backgroundColor: '#212529', // 🔹 ciemne tło (bg-dark)
            titleTextStyle: { color: '#f8f9fa' }, // jasny tytuł
            legend: { textStyle: { color: '#f8f9fa' } }, // jasna legenda
            pieSliceTextStyle: { color: '#212529' }, // ciemny tekst na kawałkach
            chartArea: { width: '90%', height: '80%' }
        };

        const chart = new google.visualization.PieChart(document.getElementById('piechartExpenses'));
        chart.draw(data, options);
    }
</script>
