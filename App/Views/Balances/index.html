{% extends "base.html" %}

{% block title %}Balances{% endblock %}

{% block body %}

{% if current_user %}
<div class="row justify-content-center align-items-center g-1 ">
    <div class="col-md-5 text-center border border-warning m-1 p-1 left-column">

    </div>
    <div class="col-md-5 text-center border border-warning m-1 p-1 right-column">

    </div>
</div>

{% endif %}

{% endblock %}
{% block footer %}
<style>
    .left-column {
        background: linear-gradient(145deg, #1c1c1c, #222);
        border: 1px solid #ffc107;
        border-radius: 16px;
        box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
        transition: all 0.4s ease;
        animation: fadeIn 0.5s ease;
        position: relative;
        z-index: 1;
        margin: 10px;
        opacity: 0.6;
    }

    .right-column {
        background: linear-gradient(145deg, #1c1c1c, #222);
        border: 1px solid #ffc107;
        border-radius: 16px;
        box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
        transition: all 0.4s ease;
        animation: fadeIn 0.5s ease;
        position: relative;
        z-index: 1;
        margin: 10px;
        opacity: 0.6;
    }

    @keyframes shake {

        0%,
        100% {
            transform: translateX(0);
        }

        25% {
            transform: translateX(-5px);
        }

        75% {
            transform: translateX(5px);
        }
    }

    .shake {
        animation: shake 0.4s ease;
    }
</style>
{% endblock %}
