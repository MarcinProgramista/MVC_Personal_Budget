{% extends "base.html" %}

{% block title %}Balances{% endblock %}

{% block body %}

{% if current_user %}
<div class="border-bottom-1 border-light m-4" style="border-bottom: 2px solid; ">
    <h1 class="text-start ">Balances for {{ nameMonth }}</h1>
</div>
<div class="expense-bg"></div>
<div class="row justify-content-center align-items-center g-1 ">
    <div class="col-md-5 text-center border border-warning m-1 p-1 left-column">
        <!-- 🔘 Przycisk pokazujący listę incomes-->
        {% include "Balances/income_balance_block.html" %}
    </div>
    <div class="col-md-5 text-center border border-warning m-1 p-1 right-column">

    </div>
</div>

{% endif %}
<script src="/js/balances.js?v={{ random() }}"></script>
{% endblock %}
{% block footer %}
<style>
    /* 🔹 Obrazek jako tło — zawsze widoczny */
    .expense-bg {
        position: absolute;
        inset: 0;
        background: url('/images/balances.png') center center no-repeat;
        background-size: contain;
        opacity: 0.45;
        filter: brightness(0.8);
        z-index: 0;
    }

    .left-column {
        background: linear-gradient(145deg, #1c1c1c, #222);
        border: 1px solid #ffc107;
        border-radius: 16px;
        box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
        transition: all 0.4s ease;
        animation: fadeIn 0.5s ease;
        position: relative;
        z-index: 1;
        margin: 10px;
        opacity: 0.6;
    }

    .right-column {
        background: linear-gradient(145deg, #1c1c1c, #222);
        border: 1px solid #ffc107;
        border-radius: 16px;
        box-shadow: 0 0 15px rgba(255, 193, 7, 0.2);
        transition: all 0.4s ease;
        animation: fadeIn 0.5s ease;
        position: relative;
        z-index: 1;
        margin: 10px;
        opacity: 0.6;
    }

    @keyframes shake {

        0%,
        100% {
            transform: translateX(0);
        }

        25% {
            transform: translateX(-5px);
        }

        75% {
            transform: translateX(5px);
        }
    }

    .shake {
        animation: shake 0.4s ease;
    }
</style>
{% endblock %}
